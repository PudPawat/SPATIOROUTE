  <text x="490" y="64" fill="#9aa8c7" font-size="14" font-family="Inter,Segoe UI,sans-serif" text-anchor="middle">First-word heuristic ’ specialized prompt template</text>

  <rect x="60" y="90" width="860" height="44" rx="8" fill="#223058"/>
