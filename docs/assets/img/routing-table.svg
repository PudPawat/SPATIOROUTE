  <text x="700" y="118" fill="#ffffff" font-size="16" font-family="Inter,Segoe UI,sans-serif" font-weight="700">Prompt template</text>

  <g font-family="Inter,Segoe UI,sans-serif" font-size="15">
    <rect x="60" y="140" width="860" height="34" fill="#141c33" stroke="#334066"/>
